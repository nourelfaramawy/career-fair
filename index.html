<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esperti Solutions — Career Track Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1a56db;
      --blue-dark: #1648c0;
      --blue-light: #E6F1FB;
      --blue-text: #042C53;
      --green-light: #EAF3DE;
      --green-text: #173404;
      --green-bar: #639922;
      --purple-light: #EEEDFE;
      --purple-text: #26215C;
      --purple-bar: #7F77DD;
      --teal: #00bfa5;
      --bg: #ffffff;
      --bg2: #f5f5f4;
      --bg3: #eeede8;
      --text: #1a1a1a;
      --text2: #6b6b6b;
      --text3: #9b9b9b;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1c;
        --bg2: #262626;
        --bg3: #2e2e2e;
        --text: #f0f0f0;
        --text2: #aaaaaa;
        --text3: #777777;
        --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22);
        --blue-light: #0c2a5c;
        --blue-text: #93c5fd;
        --green-light: #1a2e0a;
        --green-text: #a3e069;
        --purple-light: #1e1a3e;
        --purple-text: #c4b5fd;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg3);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      padding: 36px 16px 24px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 6px;
    }
    .brand-name {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .brand-name span { color: var(--blue); }
    .header-sub {
      font-size: 15px;
      color: var(--text2);
    }

    /* ── PROGRESS ── */
    .prog-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .prog-bar {
      flex: 1;
      height: 5px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 3px;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }
    .prog-label {
      font-size: 13px;
      color: var(--text3);
      white-space: nowrap;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 28px 28px 22px;
      margin-bottom: 16px;
    }

    /* ── QUESTION ── */
    .q-num {
      font-size: 11px;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .q-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .q-hint {
      font-size: 13px;
      color: var(--text3);
      font-style: italic;
      margin-bottom: 20px;
    }

    /* ── SCENARIO BOX ── */
    .scenario {
      background: var(--bg2);
      border-left: 3px solid var(--blue);
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .scenario-label {
      font-size: 11px;
      color: var(--blue);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }
    .scenario-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
    }

    /* ── OPTIONS ── */
    .opts { display: flex; flex-direction: column; gap: 9px; }
    .opt {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      background: var(--bg);
      transition: border-color .15s, background .15s, transform .1s;
      user-select: none;
    }
    .opt:hover {
      background: var(--bg2);
      border-color: var(--border2);
      transform: translateY(-1px);
    }
    .opt.selected {
      border: 2px solid var(--blue);
      background: var(--blue-light);
    }
    .opt.selected .opt-letter {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .opt-letter {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      flex-shrink: 0;
      margin-top: 1px;
      transition: background .15s, color .15s, border-color .15s;
    }
    .opt-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .opt-sub {
      font-size: 13px;
      color: var(--text2);
      margin-top: 3px;
      line-height: 1.45;
    }

    /* ── FEEDBACK CHIP ── */
    .feedback-chip {
      font-size: 12px;
      padding: 4px 13px;
      border-radius: 20px;
      background: var(--blue-light);
      color: var(--blue-text);
      opacity: 0;
      transition: opacity .3s;
      font-weight: 500;
    }
    .feedback-chip.show { opacity: 1; }

    /* ── NAVIGATION BAR ── */
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 22px;
    }
    .nav-btn {
      padding: 10px 22px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      transition: background .15s;
    }
    .nav-btn:hover { background: var(--bg2); }
    .nav-btn:disabled { opacity: .35; cursor: default; }
    .nav-btn.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .nav-btn.primary:hover { background: var(--blue-dark); }
    .nav-btn.primary:disabled { background: var(--blue); }

    /* ── RES ── */
    .match-banner {
      text-align: center;
      padding: 28px 16px 16px;
    }
    .match-pct {
      font-size: 48px;
      font-weight: 700;
      color: var(--blue);
    }
    .match-label {
      font-size: 15px;
      color: var(--text2);
      margin-top: 4px;
    }
    .track-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }
    .track-icon {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .track-name {
      font-size: 19px;
      font-weight: 600;
      color: var(--text);
    }
    .track-badge {
      font-size: 11px;
      padding: 3px 11px;
      border-radius: 20px;
      display: inline-block;
      margin-top: 4px;
      font-weight: 500;
    }
    .track-desc {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.7;
      margin-bottom: 18px;
    }
    .section-label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .skills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .skill {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--bg2);
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .bar-name {
      font-size: 13px;
      color: var(--text2);
      width: 190px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bar-track {
      flex: 1;
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      width: 0;
      transition: width .7s cubic-bezier(.4,0,.2,1);
    }
    .bar-pct {
      font-size: 13px;
      color: var(--text2);
      width: 36px;
      text-align: right;
    }

    /* ── BUTTONS ── */
    .cta-btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 14px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius-lg);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 14px;
      font-family: inherit;
      text-decoration: none;
      transition: background .15s;
    }
    .cta-btn:hover { background: var(--blue-dark); }
    .restart-btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 11px;
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
      font-family: inherit;
      transition: background .15s;
    }
    .restart-btn:hover { background: var(--bg2); }

    /* ── GOOGLE FORMS ── */
    .form-section {
      margin-top: 16px;
      background: var(--bg2);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 20px 22px;
      text-align: center;
    }
    .form-section p {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .form-link {
      display: inline-block;
      padding: 10px 24px;
      background: var(--blue);
      color: #fff;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: background .15s;
    }
    .form-link:hover { background: var(--blue-dark); }

    .hidden { display: none; }

    @media (max-width: 520px) {
      .card { padding: 20px 16px 16px; }
      .q-text { font-size: 16px; }
      .match-pct { font-size: 40px; }
      .track-name { font-size: 17px; }
      .bar-name { width: 140px; font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="page">

  <div class="header">
    <div class="logo-row">
      <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
        <path d="M4 20 C8 20 12 9 18 9 L24 5" stroke="#00bfa5" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M4 14 C8 14 12 7 20 7 L24 3" stroke="#1a56db" stroke-width="3" stroke-linecap="round" fill="none" opacity=".7"/>
        <path d="M4 24 C9 24 13 15 19 13 L24 10" stroke="#1a56db" stroke-width="3.5" stroke-linecap="round" fill="none"/>
      </svg>
      <div class="brand-name">ESPERTI <span>SOLUTIONS</span></div>
    </div>
    <p class="header-sub">Answer 7 quick questions — find your ideal career track</p>
  </div>

  <div id="quiz">
    <div class="prog-row">
      <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <span class="prog-label" id="prog-label">1 / 7</span>
    </div>
    <div class="card">
      <p class="q-num" id="q-num">Question 1</p>
      <p class="q-text" id="q-text"></p>
      <div id="scenario-area"></div>
      <p class="q-hint" id="q-hint"></p>
      <div class="opts" id="opts"></div>
      <div class="nav-row">
        <button class="nav-btn" id="back-btn" onclick="goBack()">← Back</button>
        <span class="feedback-chip" id="feedback"></span>
        <button class="nav-btn primary" id="next-btn" onclick="goNext()" disabled>Next →</button>
      </div>
    </div>
  </div>

  <div id="results" class="hidden"></div>

</div><!-- /page -->

<script>
const Qs = [
  {
    q: "When you imagine your ideal workday, what does it look like?",
    hint: "Go with your gut — there's no wrong answer.",
    opts: [
      { title: "Workshops & configuration", sub: "Sitting with business users, mapping their processes and setting up the system to match", scores: {f:3,t:1,a:0} },
      { title: "Building & debugging", sub: "Writing code, crafting integrations, and solving technical puzzles", scores: {f:0,t:3,a:1} },
      { title: "Experimenting with AI", sub: "Training models, testing outputs, and building intelligent automations", scores: {f:0,t:1,a:3} },
      { title: "Bridging teams", sub: "Translating between business needs and technical teams — speaking both languages", scores: {f:2,t:1,a:1} }
    ]
  },
  {
    q: "Which subject sounds most exciting to you?",
    hint: "Pick what genuinely energises you, not what you think sounds impressive.",
    opts: [
      { title: "Business processes", sub: "Finance flows, supply chain logistics, HR operations", scores: {f:3,t:0,a:0} },
      { title: "Programming & architecture", sub: "Languages, databases, system design, APIs", scores: {f:0,t:3,a:1} },
      { title: "Machine learning & AI", sub: "Models, data science, intelligent automation", scores: {f:0,t:1,a:3} },
      { title: "Both sides equally", sub: "You genuinely enjoy the business AND the technical side", scores: {f:2,t:2,a:1} }
    ]
  },
  {
    q: "A manufacturing company's invoices keep getting lost between departments. How do you instinctively want to tackle it?",
    scenario: {
      label: "Real scenario",
      text: "Invoices are emailed to one department, manually forwarded to another, sometimes lost, sometimes duplicated. The finance team is frustrated. The warehouse team doesn't know what's been approved. Leadership wants a fix."
    },
    hint: "Imagine you're the consultant walking in on day one.",
    opts: [
      { title: "Redesign the process end-to-end", sub: "Sit with each team, map the current mess, and reconfigure Oracle AP to automate the workflow correctly", scores: {f:3,t:0,a:0} },
      { title: "Build an integration pipeline", sub: "Write a technical flow in Oracle Integration Cloud that routes, tracks, and escalates invoices automatically", scores: {f:0,t:3,a:1} },
      { title: "Train an AI to handle it", sub: "Use a document AI model to classify, extract, and route invoices intelligently without manual rules", scores: {f:0,t:1,a:3} },
      { title: "Analyse the data first", sub: "Pull historical invoice data, find the pattern of where things break down, then recommend a fix", scores: {f:1,t:1,a:2} }
    ]
  },
  {
    q: "How do you feel about writing code?",
    hint: "Be honest — neither answer is better than the other.",
    opts: [
      { title: "Not really my thing", sub: "I prefer configuration, design decisions, and working with people over writing code", scores: {f:3,t:0,a:0} },
      { title: "I love it", sub: "Debugging and building software is genuinely satisfying to me", scores: {f:0,t:3,a:1} },
      { title: "Yes — especially Python & data", sub: "I enjoy coding for data pipelines, model training, and AI experiments", scores: {f:0,t:1,a:3} },
      { title: "I can read it, prefer higher-level work", sub: "I understand code but gravitate toward strategy and architecture", scores: {f:2,t:1,a:1} }
    ]
  },
  {
    q: "Which Oracle product makes you most curious to learn?",
    hint: "Even if you've never used them — which sounds most interesting?",
    opts: [
      { title: "Oracle Fusion Financials / SCM / HCM", sub: "The business applications that run enterprise operations", scores: {f:3,t:0,a:0} },
      { title: "Oracle Integration Cloud & APEX", sub: "Developer tools for building integrations and custom apps", scores: {f:0,t:3,a:0} },
      { title: "Oracle OCI AI Services & GenAI", sub: "AI infrastructure, language models, and intelligent services", scores: {f:0,t:0,a:3} },
      { title: "Still exploring — all of them", sub: "I'm genuinely new to Oracle and want to discover the right fit", scores: {f:1,t:1,a:1} }
    ]
  },
  {
    q: "What kind of problem gets you in a flow state?",
    hint: "Think about a time you lost track of time while working on something.",
    opts: [
      { title: "Helping an organisation run better", sub: "Improving processes, reducing inefficiency, making people's jobs easier", scores: {f:3,t:0,a:0} },
      { title: "Solving a gnarly technical puzzle", sub: "Figuring out why something broke and making it bulletproof", scores: {f:0,t:3,a:1} },
      { title: "Teaching a machine to be smarter", sub: "Feeding data, tuning models, watching accuracy improve", scores: {f:0,t:1,a:3} },
      { title: "Making complex things clear", sub: "Translating technical details into decisions stakeholders can act on", scores: {f:2,t:1,a:1} }
    ]
  },
  {
    q: "Fast-forward 3 years. Which version of yourself excites you most?",
    hint: "Pick the one that genuinely makes you smile.",
    opts: [
      { title: "The trusted Oracle ERP expert", sub: "Companies fly you in to fix their Oracle setup and trust your business judgment", scores: {f:3,t:0,a:0} },
      { title: "The senior Oracle developer", sub: "You architect and build the integrations and custom solutions other teams depend on", scores: {f:0,t:3,a:1} },
      { title: "The AI engineer", sub: "You're building intelligent applications that make enterprise software actually smart", scores: {f:0,t:1,a:3} },
      { title: "The hybrid consultant", sub: "You move fluidly between business strategy and technical delivery", scores: {f:2,t:2,a:1} }
    ]
  }
];

const TRACKS = {
  f: {
    name: "Oracle Functional Consultant",
    tag: "ERP Business Track",
    tagBg: "var(--blue-light)", tagColor: "var(--blue-text)",
    iconBg: "var(--blue-light)", icon: "🗂️", barColor: "#1a56db",
    desc: "You're drawn to understanding how businesses actually work and configuring Oracle ERP to match their reality. Functional consultants run discovery workshops, design solutions across Oracle Fusion modules — Finance, Supply Chain, HCM — and make sure the system truly fits the organisation. You're the one clients trust when they need someone who speaks both business and Oracle.",
    skills: ["Oracle Fusion Financials","Oracle SCM","Oracle HCM","Business Process Analysis","Gap-Fit Design","UAT","ERP Configuration"]
  },
  t: {
    name: "Oracle Technical Consultant",
    tag: "ERP Technical Track",
    tagBg: "var(--green-light)", tagColor: "var(--green-text)",
    iconBg: "var(--green-light)", icon: "💻", barColor: "#639922",
    desc: "You love building the systems that make Oracle actually work under the hood. Technical consultants develop custom extensions, integrations, and reports. You'll live in Oracle Integration Cloud, APEX, PL/SQL, and REST APIs — turning complex technical requirements into clean, scalable solutions that the business can rely on.",
    skills: ["Oracle Integration Cloud","PL/SQL","Oracle APEX","BI Publisher","REST APIs","OTBI","Oracle ADF"]
  },
  a: {
    name: "AI Development Engineer",
    tag: "AI & Innovation Track",
    tagBg: "var(--purple-light)", tagColor: "var(--purple-text)",
    iconBg: "var(--purple-light)", icon: "🤖", barColor: "#7F77DD",
    desc: "You're excited about building intelligent systems that can think, learn, and adapt. AI Development Engineers build and deploy machine learning models, integrate large language models into enterprise workflows, and create intelligent automation on top of Oracle environments. At Esperti, you'll be at the frontier of where ERP meets AI.",
    skills: ["Python","Machine Learning","LLM Integration","Oracle OCI AI Services","Data Pipelines","Prompt Engineering","GenAI Applications"]
  }
};

const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdMqmqTJ3lOlEAlmw1HfamVjba0Ce3ahRa6BwckWjoYCZJndA/viewform";

let cur = 0, sel = [], scores = {f:0,t:0,a:0};
const LETTERS = ["A","B","C","D"];
const CHIPS = ["Nice — makes sense!","Good instinct!","Interesting choice!","That tells us a lot!"];

function render() {
  const q = Qs[cur];
  document.getElementById("q-num").textContent = "Question " + (cur + 1);
  document.getElementById("q-text").textContent = q.q;
  document.getElementById("q-hint").textContent = q.hint || "";
  document.getElementById("prog").style.width = ((cur / Qs.length) * 100) + "%";
  document.getElementById("prog-label").textContent = (cur + 1) + " / " + Qs.length;
  document.getElementById("back-btn").disabled = cur === 0;
  document.getElementById("next-btn").disabled = sel[cur] === undefined;
  document.getElementById("next-btn").textContent = cur === Qs.length - 1 ? "See my results →" : "Next →";

  const fb = document.getElementById("feedback");
  fb.classList.remove("show");

  const sa = document.getElementById("scenario-area");
  if (q.scenario) {
    sa.innerHTML = '<div class="scenario"><div class="scenario-label">' + q.scenario.label + '</div><div class="scenario-text">' + q.scenario.text + '</div></div>';
  } else {
    sa.innerHTML = "";
  }

  const container = document.getElementById("opts");
  container.innerHTML = "";
  q.opts.forEach(function(o, i) {
    const div = document.createElement("div");
    div.className = "opt" + (sel[cur] === i ? " selected" : "");
    div.innerHTML = '<div class="opt-letter">' + LETTERS[i] + '</div><div><div class="opt-title">' + o.title + '</div><div class="opt-sub">' + o.sub + '</div></div>';
    div.onclick = function() { pick(i); };
    container.appendChild(div);
  });
}

function pick(i) {
  sel[cur] = i;
  document.querySelectorAll(".opt").forEach(function(el, j) {
    el.className = "opt" + (j === i ? " selected" : "");
  });
  document.getElementById("next-btn").disabled = false;
  const fb = document.getElementById("feedback");
  fb.textContent = CHIPS[i];
  fb.classList.add("show");
}

function goNext() {
  if (sel[cur] === undefined) return;
  if (cur === Qs.length - 1) { showResults(); return; }
  cur++;
  render();
}

function goBack() {
  if (cur > 0) { cur--; render(); }
}

function showResults() {
  scores = {f:0, t:0, a:0};
  Qs.forEach(function(q, i) {
    if (sel[i] !== undefined) {
      var s = q.opts[sel[i]].scores;
      scores.f += s.f; scores.t += s.t; scores.a += s.a;
    }
  });

  var total = scores.f + scores.t + scores.a || 1;
  var pct = {
    f: Math.round(scores.f / total * 100),
    t: Math.round(scores.t / total * 100),
    a: Math.round(scores.a / total * 100)
  };

  var ranked = Object.entries(scores).sort(function(a,b){ return b[1]-a[1]; });
  var topKey = ranked[0][0];
  var tr = TRACKS[topKey];

  document.getElementById("quiz").classList.add("hidden");
  var r = document.getElementById("results");
  r.classList.remove("hidden");

  var barRows = ranked.map(function(entry) {
    var k = entry[0];
    var t = TRACKS[k];
    return '<div class="bar-row">' +
      '<span class="bar-name">' + t.icon + ' ' + t.name + '</span>' +
      '<div class="bar-track"><div class="bar-fill" id="bar-' + k + '" style="width:0%;background:' + t.barColor + '"></div></div>' +
      '<span class="bar-pct">' + pct[k] + '%</span>' +
      '</div>';
  }).join("");

  r.innerHTML =
    '<div class="match-banner">' +
      '<div class="match-pct">' + pct[topKey] + '% match</div>' +
      '<div class="match-label">Your strongest alignment is with</div>' +
    '</div>' +
    '<div class="card">' +
      '<div class="track-header">' +
        '<div class="track-icon" style="background:' + tr.iconBg + ';font-size:24px;">' + tr.icon + '</div>' +
        '<div>' +
          '<div class="track-name">' + tr.name + '</div>' +
          '<span class="track-badge" style="background:' + tr.tagBg + ';color:' + tr.tagColor + ';">' + tr.tag + '</span>' +
        '</div>' +
      '</div>' +
      '<p class="track-desc">' + tr.desc + '</p>' +
      '<div class="section-label">Skills you\'ll develop</div>' +
      '<div class="skills">' + tr.skills.map(function(s){ return '<span class="skill">' + s + '</span>'; }).join("") + '</div>' +
      '<div class="section-label" style="margin-top:18px;">How you compare across all tracks</div>' +
      barRows +
    '</div>' +
    '<div class="form-section">' +
      '<p>Ready to take the next step? Fill in our interest form and our team will be in touch about the <strong>' + tr.name + '</strong> track.</p>' +
      '<a class="form-link" href="' + FORM_URL + '" target="_blank">Fill in the interest form →</a>' +
    '</div>' +
    '<button class="restart-btn" onclick="restart()">Retake the quiz</button>';

  setTimeout(function() {
    ranked.forEach(function(entry) {
      var k = entry[0];
      var el = document.getElementById("bar-" + k);
      if (el) el.style.width = pct[k] + "%";
    });
  }, 100);
}

function restart() {
  cur = 0; sel = []; scores = {f:0,t:0,a:0};
  document.getElementById("results").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  render();
}

render();
</script>
</body>
</html>
